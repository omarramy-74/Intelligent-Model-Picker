<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Intelligent Model Picker </title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080b10;
    --surface:  #0e1420;
    --border:   #1c2a3f;
    --accent:   #00e5ff;
    --accent2:  #7b61ff;
    --accent3:  #39ff8a;
    --text:     #d6e4f7;
    --muted:    #4a6080;
    --danger:   #ff5c5c;
    --card:     #0d1826;
    --glow:     rgba(0,229,255,.18);
    --glow2:    rgba(123,97,255,.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── grid noise texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll { to { background-position: 48px 48px; } }

  /* ── animated orbs ── */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0;
  }
  .orb-1 { width: 500px; height: 500px; top: -200px; left: -150px;
    background: radial-gradient(circle, rgba(0,229,255,.08), transparent 70%); }
  .orb-2 { width: 400px; height: 400px; bottom: -100px; right: -100px;
    background: radial-gradient(circle, rgba(123,97,255,.1), transparent 70%); }

  .container {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  /* ── header ── */
  header { text-align: center; margin-bottom: 3.5rem; }

  .logo-badge {
    display: inline-flex; align-items: center; gap: .5rem;
    background: rgba(0,229,255,.07);
    border: 1px solid rgba(0,229,255,.2);
    border-radius: 100px; padding: .35rem 1rem;
    font-family: 'Space Mono', monospace; font-size: .7rem;
    color: var(--accent); letter-spacing: .12em;
    text-transform: uppercase; margin-bottom: 1.4rem;
  }
  .logo-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  h1 {
    font-size: clamp(2.6rem, 6vw, 4rem);
    font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
    background: linear-gradient(120deg, #fff 30%, var(--accent) 70%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: .8rem;
  }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: .8rem; color: var(--muted); letter-spacing: .06em;
  }

  /* ── input card ── */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 1.8rem;
    box-shadow: 0 0 40px rgba(0,229,255,.04);
    margin-bottom: 2rem;
    transition: border-color .3s, box-shadow .3s;
  }
  .input-card:focus-within {
    border-color: rgba(0,229,255,.4);
    box-shadow: 0 0 60px rgba(0,229,255,.08), inset 0 1px 0 rgba(0,229,255,.1);
  }

  .input-label {
    font-family: 'Space Mono', monospace; font-size: .68rem;
    color: var(--accent); letter-spacing: .14em; text-transform: uppercase;
    margin-bottom: .8rem; display: block;
  }

  textarea {
    width: 100%; background: transparent;
    border: none; outline: none; resize: none;
    font-family: 'Space Mono', monospace; font-size: .92rem;
    color: var(--text); line-height: 1.7;
    min-height: 110px;
    caret-color: var(--accent);
  }
  textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1.2rem; padding-top: 1.2rem;
    border-top: 1px solid var(--border);
  }
  .char-count {
    font-family: 'Space Mono', monospace; font-size: .68rem; color: var(--muted);
  }

  .btn {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--accent); color: #000;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: .85rem; letter-spacing: .04em;
    border: none; border-radius: 10px;
    padding: .75rem 1.8rem; cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .15s;
    box-shadow: 0 0 24px rgba(0,229,255,.3);
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(0,229,255,.5);
  }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn .icon { font-size: 1rem; transition: transform .3s; }
  .btn:hover:not(:disabled) .icon { transform: translateX(4px); }

  /* ── pipeline viz ── */
  .pipeline {
    display: flex; align-items: center; gap: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.2rem 1.5rem;
    margin-bottom: 2rem; overflow-x: auto;
  }

  .p-node {
    display: flex; flex-direction: column; align-items: center; gap: .4rem;
    flex-shrink: 0;
    transition: opacity .4s;
  }
  .p-node.inactive { opacity: .3; }
  .p-node.active .p-dot {
    background: var(--accent);
    box-shadow: 0 0 16px var(--accent);
    animation: nodePulse .8s ease-in-out infinite alternate;
  }
  .p-node.done .p-dot { background: var(--accent3); box-shadow: 0 0 12px var(--accent3); }

  @keyframes nodePulse { from{transform:scale(1)} to{transform:scale(1.25)} }

  .p-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--border); border: 2px solid var(--muted);
    transition: background .4s, box-shadow .4s;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem;
  }
  .p-label {
    font-family: 'Space Mono', monospace; font-size: .6rem;
    color: var(--muted); text-align: center; white-space: nowrap;
  }
  .p-node.active .p-label, .p-node.done .p-label { color: var(--text); }

  .p-arrow {
    flex: 1; height: 2px; min-width: 24px;
    background: linear-gradient(90deg, var(--border), var(--border));
    position: relative; overflow: hidden;
    margin: 0 .25rem;
    transition: background .4s;
    margin-bottom: 1.4rem;
  }
  .p-arrow.active {
    background: linear-gradient(90deg, var(--accent3), var(--accent));
  }
  .p-arrow.active::after {
    content: '';
    position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
    animation: flow .8s linear infinite;
  }
  @keyframes flow { to { left: 100%; } }

  /* ── result sections ── */
  .results { display: flex; flex-direction: column; gap: 1.2rem; }

  .result-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    opacity: 0; transform: translateY(20px);
    transition: opacity .5s, transform .5s, border-color .3s;
  }
  .result-card.visible { opacity: 1; transform: translateY(0); }
  .result-card.highlight { border-color: rgba(0,229,255,.3); }

  .rc-header {
    display: flex; align-items: center; gap: .8rem;
    padding: 1rem 1.4rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  .rc-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .rc-icon.cyan  { background: rgba(0,229,255,.12); }
  .rc-icon.green { background: rgba(57,255,138,.12); }
  .rc-icon.violet{ background: rgba(123,97,255,.15); }
  .rc-icon.amber { background: rgba(255,177,0,.12); }

  .rc-title {
    font-family: 'Space Mono', monospace; font-size: .68rem;
    color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
  }
  .rc-value {
    margin-left: auto; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: .9rem;
  }
  .rc-value.tag {
    background: rgba(0,229,255,.1); border: 1px solid rgba(0,229,255,.25);
    color: var(--accent); border-radius: 6px; padding: .2rem .7rem;
    font-size: .78rem; letter-spacing: .04em;
  }
  .rc-value.tag.green {
    background: rgba(57,255,138,.1); border-color: rgba(57,255,138,.25);
    color: var(--accent3);
  }
  .rc-value.tag.red {
    background: rgba(255,92,92,.1); border-color: rgba(255,92,92,.25);
    color: var(--danger);
  }
  .rc-value.tag.violet {
    background: rgba(123,97,255,.12); border-color: rgba(123,97,255,.3);
    color: #a89eff;
  }

  .rc-body {
    padding: 1.4rem;
    font-family: 'Space Mono', monospace; font-size: .85rem;
    line-height: 1.8; color: var(--text);
  }

  /* model badge */
  .model-badge {
    display: inline-flex; align-items: center; gap: .5rem;
    background: rgba(123,97,255,.1);
    border: 1px solid rgba(123,97,255,.3);
    border-radius: 8px; padding: .5rem 1rem;
    font-family: 'Space Mono', monospace; font-size: .78rem;
    color: #a89eff;
  }
  .model-badge::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: #7b61ff; box-shadow: 0 0 8px #7b61ff;
  }

  /* response text */
  .response-text {
    font-family: 'Space Mono', monospace; font-size: .82rem;
    line-height: 1.9; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  .response-text .cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--accent); animation: blink .7s step-end infinite;
    vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── search sources ── */
  .sources {
    margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);
  }
  .sources-title {
    font-family: 'Space Mono', monospace; font-size: .62rem;
    color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
    margin-bottom: .6rem;
  }
  .source-chip {
    display: inline-flex; align-items: center; gap: .3rem;
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
    border-radius: 6px; padding: .25rem .6rem; margin: .25rem .2rem 0 0;
    font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted);
    max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── loading ── */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,229,255,.3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── error ── */
  .error-card {
    background: rgba(255,92,92,.06); border: 1px solid rgba(255,92,92,.25);
    border-radius: 14px; padding: 1.2rem 1.5rem;
    font-family: 'Space Mono', monospace; font-size: .82rem;
    color: var(--danger); display: none;
  }
  .error-card.visible { display: block; }

  /* ── footer ── */
  footer {
    text-align: center; margin-top: 4rem;
    font-family: 'Space Mono', monospace; font-size: .65rem;
    color: var(--muted); letter-spacing: .08em;
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ── history ── */
  .history-section { margin-top: 3rem; }
  .history-title {
    font-family: 'Space Mono', monospace; font-size: .68rem;
    color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .history-list { display: flex; flex-direction: column; gap: .6rem; }
  .history-item {
    display: flex; align-items: center; gap: .8rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: .7rem 1rem;
    cursor: pointer; transition: border-color .2s, background .2s;
  }
  .history-item:hover {
    border-color: rgba(0,229,255,.25);
    background: rgba(0,229,255,.03);
  }
  .history-q {
    flex: 1; font-family: 'Space Mono', monospace; font-size: .75rem;
    color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-meta {
    font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted);
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    h1 { font-size: 2.2rem; }
    .pipeline { padding: 1rem; gap: 0; }
    .p-arrow { min-width: 14px; }
  }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo-badge">LangGraph Router v1.0</div>
    <h1>Intelligent Model Picker </h1>
  </header>

  <!-- Input -->
  <div class="input-card">
    <label class="input-label" for="queryInput">// your query</label>
    <textarea id="queryInput" placeholder="Ask anything — code, math, reasoning, data analysis, or let the router decide..." rows="4" spellcheck="false"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 chars</span>
      <button class="btn" id="submitBtn" onclick="submitQuery()">
        Route Query <span class="icon">→</span>
      </button>
    </div>
  </div>

  <!-- Pipeline Visualization -->
  <div class="pipeline" id="pipeline">
    <div class="p-node inactive" id="node-classify">
      <div class="p-dot">🧠</div>
      <div class="p-label">CLASSIFY</div>
    </div>
    <div class="p-arrow" id="arrow-1"></div>
    <div class="p-node inactive" id="node-search-decide">
      <div class="p-dot">🔍</div>
      <div class="p-label">SEARCH?</div>
    </div>
    <div class="p-arrow" id="arrow-2"></div>
    <div class="p-node inactive" id="node-search">
      <div class="p-dot">🌐</div>
      <div class="p-label">WEB SEARCH</div>
    </div>
    <div class="p-arrow" id="arrow-3"></div>
    <div class="p-node inactive" id="node-model">
      <div class="p-dot">⚡</div>
      <div class="p-label">PICK MODEL</div>
    </div>
    <div class="p-arrow" id="arrow-4"></div>
    <div class="p-node inactive" id="node-run">
      <div class="p-dot">✨</div>
      <div class="p-label">GENERATE</div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Results -->
  <div class="results" id="results"></div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">// recent queries</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<footer>
  <p>NeurRoute GUI · <a href="#">LangGraph</a> + <a href="#">OpenRouter</a> · <a href="#">Tavily Search</a></p>
</footer>

<script>
// ─────────────────────────────────────────────
//  Config – change this to match your server
// ─────────────────────────────────────────────
const API_URL = "http://localhost:5000/ask";

// ─────────────────────────────────────────────
//  Local query history
// ─────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem("nr_history") || "[]");

const textarea   = document.getElementById("queryInput");
const charCount  = document.getElementById("charCount");
const submitBtn  = document.getElementById("submitBtn");
const resultsEl  = document.getElementById("results");
const errorCard  = document.getElementById("errorCard");

textarea.addEventListener("input", () => {
  charCount.textContent = textarea.value.length + " chars";
});

textarea.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submitQuery();
});

// ─────────────────────────────────────────────
//  Pipeline node helpers
// ─────────────────────────────────────────────
function resetPipeline() {
  ["node-classify","node-search-decide","node-search","node-model","node-run"].forEach(id => {
    const el = document.getElementById(id);
    el.className = "p-node inactive";
  });
  ["arrow-1","arrow-2","arrow-3","arrow-4"].forEach(id => {
    document.getElementById(id).className = "p-arrow";
  });
}

function activateNode(nodeId, arrowId) {
  if (arrowId) document.getElementById(arrowId).className = "p-arrow active";
  document.getElementById(nodeId).className = "p-node active";
}

function doneNode(nodeId) {
  document.getElementById(nodeId).className = "p-node done";
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────────
//  Result card builder
// ─────────────────────────────────────────────
function makeCard(html, delay = 0) {
  const card = document.createElement("div");
  card.className = "result-card";
  card.innerHTML = html;
  resultsEl.appendChild(card);
  setTimeout(() => card.classList.add("visible"), delay);
  return card;
}

function tagClass(label) {
  if (!label) return "";
  const l = label.toLowerCase();
  if (l.includes("yes")) return " green";
  if (l.includes("no"))  return " red";
  if (l.includes("reason") || l.includes("global")) return "";
  return " violet";
}

// ─────────────────────────────────────────────
//  Typewriter effect
// ─────────────────────────────────────────────
function typewrite(el, text, speed = 8) {
  el.innerHTML = '<span class="cursor"></span>';
  let i = 0;
  const cursor = el.querySelector(".cursor");
  const interval = setInterval(() => {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
    } else {
      cursor.remove();
      clearInterval(interval);
    }
  }, speed);
}

// ─────────────────────────────────────────────
//  Main submit
// ─────────────────────────────────────────────
async function submitQuery() {
  const query = textarea.value.trim();
  if (!query) return;

  // reset UI
  resultsEl.innerHTML = "";
  errorCard.className = "error-card";
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Routing…';
  resetPipeline();

  try {
    // Stage 1 – classify
    activateNode("node-classify");
    await sleep(400);

    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query })
    });

    if (!resp.ok) throw new Error(`Server error: ${resp.status} ${resp.statusText}`);
    const data = await resp.json();

    // Stage 2 – classify done → search decide
    doneNode("node-classify");
    activateNode("node-search-decide", "arrow-1");
    await sleep(300);

    // Stage 3 – search or skip
    const needsSearch = (data.needs_search || "no").toLowerCase() === "yes";
    if (needsSearch) {
      doneNode("node-search-decide");
      activateNode("node-search", "arrow-2");
      await sleep(400);
      doneNode("node-search");
    } else {
      doneNode("node-search-decide");
      document.getElementById("node-search").className = "p-node inactive";
    }

    // Stage 4 – model pick
    activateNode("node-model", "arrow-3");
    await sleep(300);
    doneNode("node-model");

    // Stage 5 – generate
    activateNode("node-run", "arrow-4");
    await sleep(300);
    doneNode("node-run");

    // ── Card 1: Type
    const typeCard = makeCard(`
      <div class="rc-header">
        <div class="rc-icon cyan">🏷️</div>
        <div class="rc-title">Query Type</div>
        <span class="rc-value tag">${data.classify || "Unknown"}</span>
      </div>`, 0);
    typeCard.classList.add("highlight");

    // ── Card 2: Search
    makeCard(`
      <div class="rc-header">
        <div class="rc-icon green">🌐</div>
        <div class="rc-title">Web Search Used</div>
        <span class="rc-value tag${tagClass(data.needs_search)}">${needsSearch ? "YES" : "NO"}</span>
      </div>
      ${needsSearch && data.search_result ? `
      <div class="rc-body">
        <div class="sources">
          <div class="sources-title">Retrieved sources</div>
          ${data.search_result.split(/\n(?=\[\d+\])/).slice(0,3).map(s => {
            const urlMatch = s.match(/https?:\/\/[^\s]+/);
            const url = urlMatch ? urlMatch[0] : "source";
            return `<span class="source-chip">🔗 ${url}</span>`;
          }).join("")}
        </div>
      </div>` : ""}`, 150);

    // ── Card 3: Model
    makeCard(`
      <div class="rc-header">
        <div class="rc-icon violet">⚡</div>
        <div class="rc-title">Selected Model</div>
      </div>
      <div class="rc-body">
        <div class="model-badge">${data.model || "Unknown"}</div>
      </div>`, 300);

    // ── Card 4: Response
    const respCard = makeCard(`
      <div class="rc-header">
        <div class="rc-icon amber">✨</div>
        <div class="rc-title">Response</div>
      </div>
      <div class="rc-body">
        <div class="response-text" id="responseText"></div>
      </div>`, 450);

    setTimeout(() => {
      const rt = document.getElementById("responseText");
      if (rt) typewrite(rt, data.response || "(No response returned)", 6);
    }, 600);

    // ── History
    saveHistory(query, data.classify, data.model);

  } catch (err) {
    resetPipeline();
    errorCard.textContent = "⚠ " + (err.message || "Connection failed. Make sure server.py is running on localhost:5000.");
    errorCard.className = "error-card visible";
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = 'Route Query <span class="icon">→</span>';
  }
}

// ─────────────────────────────────────────────
//  History
// ─────────────────────────────────────────────
function saveHistory(q, type, model) {
  history.unshift({ q, type, model, ts: Date.now() });
  if (history.length > 10) history = history.slice(0, 10);
  localStorage.setItem("nr_history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (!history.length) return;
  document.getElementById("historySection").style.display = "block";
  const list = document.getElementById("historyList");
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-q">${h.q}</div>
      <div class="history-meta">${h.type || "?"}</div>
    </div>
  `).join("");
}

function loadHistory(i) {
  textarea.value = history[i].q;
  charCount.textContent = textarea.value.length + " chars";
  textarea.focus();
}

renderHistory();
</script>
</body>
</html>
